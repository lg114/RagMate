<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'">
<title>RagMate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<main id="main">

  <section id="panel-chat" class="panel active">
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="logo">RagMate</span>
          <nav class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="chat">对话</button>
            <button class="sidebar-tab" data-tab="documents">文档</button>
          </nav>
        </div>
        <div class="sidebar-section">
          <div class="history-header">
            <span>历史</span>
            <button id="btn-refresh-sessions" class="btn-icon" title="刷新">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
          </div>
          <div id="history-list" class="history-list">
            <div class="history-empty">暂无记录</div>
          </div>
        </div>
      </aside>
      <div class="content">
        <div id="view-chat" class="view">
          <div class="chat-header">
            <span id="chat-title">对话</span>
            <button id="btn-new-chat" class="btn-text">新对话</button>
          </div>
          <div id="chat-messages" class="chat-messages">
            <div id="hero-empty" class="hero-empty">
              <canvas id="hero-canvas" class="hero-canvas"></canvas>
              <div class="hero-content">
                <h1 class="hero-title">你的<span class="accent">知识库</span> AI 助手</h1>
                <p class="hero-subtitle">上传文档，建立专属知识库。提问即检索，精准溯源，拒绝幻觉。</p>
                <div class="hero-suggestions">
                  <button class="hero-suggestion" data-q="这个知识库包含哪些文档？">这个知识库包含哪些文档？</button>
                  <button class="hero-suggestion" data-q="帮我总结一下核心要点">帮我总结核心要点</button>
                  <button class="hero-suggestion" data-q="有哪些常见问题和解决方案？">常见问题和解决方案</button>
                </div>
              </div>
            </div>
          </div>
          <div id="chat-error" class="chat-error hidden"></div>
          <form id="chat-form" class="chat-input-wrap">
            <div class="chat-input-row">
              <span class="input-prefix-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z" fill="currentColor" opacity="0.5"/>
                </svg>
              </span>
              <textarea id="chat-textarea" placeholder="输入问题…" rows="1" autocomplete="off"></textarea>
              <button type="submit" id="btn-send" class="btn-send" title="发送">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="#0a0a12"/>
                </svg>
              </button>
            </div>
          </form>
        </div>

        <div id="view-documents" class="view hidden">
          <div class="doc-toolbar">
            <div class="doc-upload-area">
              <label class="upload-zone" id="upload-zone">
                <input type="file" id="file-input" accept=".pdf,.docx,.xlsx,.xls,.txt,.md" multiple hidden>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>上传文档</span>
              </label>
              <span id="upload-error" class="upload-error hidden"></span>
            </div>
            <div class="doc-actions">
              <button id="btn-ingest" class="btn-primary" disabled>
                <span id="btn-ingest-text">入库</span>
                <span id="btn-ingest-spinner" class="spinner hidden"></span>
              </button>
              <button id="btn-batch-delete" class="btn-batch-delete" disabled>
                <span id="btn-batch-delete-text">删除</span>
              </button>
            </div>
          </div>
          <div class="doc-table-wrap">
            <table class="doc-table">
              <thead>
                <tr>
                  <th class="col-check"><input type="checkbox" id="doc-select-all"></th>
                  <th>文件名</th>
                  <th>大小</th>
                  <th>状态</th>
                  <th>上传时间</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="doc-table-body"></tbody>
            </table>
            <div id="doc-empty" class="empty-state">
              <div class="empty-label">暂无文档，上传文档开始</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

</main>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="modal-message"></p>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn-modal btn-modal-cancel">取消</button>
      <button id="modal-confirm" class="btn-modal btn-modal-confirm">确定</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
